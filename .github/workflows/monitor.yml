name: 네이버 예약 모니터

on:
  schedule:
    - cron: "0 */5 * * *"   # 체인 끊겼을 때 복구용 백업
  workflow_dispatch:
  push:
    branches: [main]
    paths: [".monitor_restart_request"]   # 이 파일 커밋으로 즉시 재시작

permissions:
  contents: write   # schedule_cache.json 자동 커밋/푸시용
  actions: write    # 다음 실행 self-trigger용

concurrency:
  group: monitor-run
  cancel-in-progress: false   # 실행 중인 것은 유지, 대기 중인 것만 교체

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests playwright

      - name: Playwright 캐시
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}

      - name: Chromium 설치
        run: playwright install chromium --with-deps

      - name: 예약 자리 확인
        env:
          CHECK_INTERVAL_SEC: "60"
          LOOP_HOURS: "5.5"
          NAVER_COOKIES: ${{ secrets.NAVER_COOKIES }}
          NAVER_COOKIES_1: ${{ secrets.NAVER_COOKIES_1 }}
          NAVER_COOKIES_2: ${{ secrets.NAVER_COOKIES_2 }}
          NAVER_COOKIES_3: ${{ secrets.NAVER_COOKIES_3 }}
          NAVER_COOKIES_4: ${{ secrets.NAVER_COOKIES_4 }}
          NAVER_COOKIES_5: ${{ secrets.NAVER_COOKIES_5 }}
          KAKAO_COOKIES: ${{ secrets.KAKAO_COOKIES }}
          AUTO_BOOK_DRY_RUN: ${{ vars.AUTO_BOOK_DRY_RUN }}
        run: python -u check_booking.py

      - name: 자동예약 스크린샷 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: auto-book-shots-${{ github.run_id }}
          path: auto_book_shots/
          if-no-files-found: ignore

      - name: 다음 실행 즉시 트리거
        if: ${{ !cancelled() }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run monitor.yml --repo ${{ github.repository }}
