name: 네이버 예약 모니터

on:
  schedule:
    - cron: "0 */5 * * *"   # 5시간마다 자동 재시작 (5.5시간 루프와 30분 겹침으로 공백 없음)
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests playwright

      - name: Playwright 캐시
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}

      - name: Chromium 설치 (캐시 없을 때만)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: playwright install chromium --with-deps

      - name: Chromium 시스템 의존성 (캐시 있을 때)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: playwright install-deps chromium

      - name: 예약 자리 확인
        env:
          CHECK_INTERVAL_SEC: "120"
          LOOP_HOURS: "5.5"
          NAVER_COOKIES: ${{ secrets.NAVER_COOKIES }}
        run: python -u check_booking.py
