name: 사전예약 오픈 감지

on:
  schedule:
    - cron: "0 0 * * *"   # 체인 끊겼을 때 복구용 백업 (매일 자정)
  workflow_dispatch:

permissions:
  contents: write
  actions: write    # 다음 실행 self-trigger용

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    concurrency:
      group: presale-monitor
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests

      - name: Git 설정
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: 사전예약 오픈 체크 (5분 간격, 5.5시간 루프)
        run: |
          push_with_retry() {
            git push && return 0
            echo "[경고] push 실패 → pull 후 재시도"
            sleep 3
            git pull --rebase --autostash origin main && git push && return 0
            echo "[경고] push 2회 실패, 다음 주기에 재시도"
            return 1
          }
          send_pending_ntfy() {
            [ -f pending_ntfy.json ] || return 0
            python3 -c "import json,requests,sys;cfg=json.load(open('presale_config.json'));topic=cfg.get('ntfy_topic','');[requests.post(f'https://ntfy.sh/{topic}',data=it['body'].encode(),headers={'Title':it['title'],'Priority':'urgent','Click':it['url'],'Tags':'bell'},timeout=10) for it in json.load(open('pending_ntfy.json'))] if topic else None" 2>/dev/null || true
            rm -f pending_ntfy.json
          }
          END_TIME=$(($(date +%s) + 19800))
          while [ $(date +%s) -lt $END_TIME ]; do
            rm -f pending_ntfy.json
            python -u presale_monitor.py --once || true
            git add presale_data.json presale_config.json
            if ! git diff --staged --quiet; then
              if git pull --rebase --autostash origin main; then
                # autostash가 변경사항을 unstaged로 복원하므로 재스테이징 필요
                git add presale_data.json presale_config.json
                if ! git diff --staged --quiet; then
                  git commit -m "data: presale update [skip ci]"
                  if push_with_retry; then
                    send_pending_ntfy
                  fi
                fi
              else
                echo "[경고] rebase 충돌, 스테이지 초기화 후 계속"
                git rebase --abort || true
                git checkout origin/main -- presale_config.json 2>/dev/null || true
                git restore --staged presale_data.json presale_config.json 2>/dev/null || true
              fi
            fi
            rm -f pending_ntfy.json
            REMAINING=$((END_TIME - $(date +%s)))
            [ $REMAINING -gt 300 ] && sleep 300
          done

      - name: 다음 실행 즉시 트리거
        if: ${{ !cancelled() }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run presale.yml --repo ${{ github.repository }}
