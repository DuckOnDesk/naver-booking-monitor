name: 사전예약 오픈 감지

on:
  schedule:
    - cron: "0 0 * * *"   # 체인 끊겼을 때 복구용 백업 (매일 자정)
  workflow_dispatch:

permissions:
  contents: write
  actions: write    # 다음 실행 self-trigger용

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    concurrency:
      group: presale-monitor
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests

      - name: Git 설정
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: 사전예약 오픈 체크 (5분 간격, 5.5시간 루프)
        run: |
          push_with_retry() {
            git push && return 0
            echo "[경고] push 실패 → pull 후 재시도"
            sleep 3
            git pull --rebase --autostash origin main && git push && return 0
            echo "[경고] push 2회 실패, 다음 주기에 재시도"
            return 1
          }
          send_pending_ntfy() {
            # 한글 제목이 헤더 인코딩 오류로 발송 실패하지 않도록 presale_monitor.py의 검증된 발송 로직 사용
            python3 presale_monitor.py --flush-ntfy || true
            rm -f pending_ntfy.json
          }
          END_TIME=$(($(date +%s) + 19800))
          while [ $(date +%s) -lt $END_TIME ]; do
            rm -f pending_ntfy.json
            python -u presale_monitor.py --once || true
            git add presale_data.json presale_config.json
            if ! git diff --staged --quiet; then
              if git pull --rebase --autostash origin main; then
                # autostash가 변경사항을 unstaged로 복원하므로 재스테이징 필요
                git add presale_data.json presale_config.json
                # 안전장치: autostash pop 충돌 마커나 깨진 JSON을 절대 커밋하지 않음
                files_ok=1
                for f in presale_config.json presale_data.json; do
                  if grep -qE '^(<<<<<<<|=======|>>>>>>>)' "$f" \
                     || ! python3 -c "import json,sys; json.load(open(sys.argv[1]))" "$f" 2>/dev/null; then
                    echo "[경고] $f 손상 감지 (충돌 마커 또는 깨진 JSON)"
                    files_ok=0
                  fi
                done
                if [ $files_ok -eq 0 ]; then
                  echo "[복구] origin/main 버전으로 되돌리고 이번 주기 커밋 건너뜀 (다음 주기 재시도)"
                  git checkout origin/main -- presale_config.json presale_data.json 2>/dev/null || true
                  git restore --staged presale_config.json presale_data.json 2>/dev/null || true
                elif ! git diff --staged --quiet; then
                  git commit -m "data: presale update [skip ci]"
                  if push_with_retry; then
                    send_pending_ntfy
                  fi
                fi
              else
                echo "[경고] rebase 충돌, 스테이지 초기화 후 계속"
                git rebase --abort || true
                git checkout origin/main -- presale_config.json 2>/dev/null || true
                git restore --staged presale_data.json presale_config.json 2>/dev/null || true
              fi
            fi
            rm -f pending_ntfy.json
            REMAINING=$((END_TIME - $(date +%s)))
            [ $REMAINING -gt 300 ] && sleep 300
          done

      - name: 다음 실행 즉시 트리거
        if: ${{ !cancelled() }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run presale.yml --repo ${{ github.repository }}
