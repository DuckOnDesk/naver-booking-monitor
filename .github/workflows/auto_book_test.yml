name: 자동예약 드라이런 테스트

on:
  workflow_dispatch:
    inputs:
      url:
        description: 테스트할 네이버 예약 상품 URL
        required: true
        default: "https://m.booking.naver.com/booking/6/bizes/1682141/items/7794800?startDate=2026-07-10"
      date:
        description: 테스트 날짜 (YYYY-MM-DD, 비우면 자동 탐색)
        required: false
        default: ""

permissions:
  contents: read

jobs:
  dryrun:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests playwright

      - name: Playwright 캐시
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}

      - name: Chromium 설치
        run: playwright install chromium --with-deps

      - name: 드라이런 실행 (실제 예약 안 함)
        env:
          NAVER_COOKIES: ${{ secrets.NAVER_COOKIES }}
        run: python -u auto_book_test.py "${{ inputs.url }}" "${{ inputs.date }}"

      - name: 스크린샷 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dryrun-shots-${{ github.run_id }}
          path: auto_book_shots/
          if-no-files-found: ignore
