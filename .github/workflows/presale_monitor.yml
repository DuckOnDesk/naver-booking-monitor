name: 사전예약 오픈 감지

on:
  schedule:
    - cron: "*/30 * * * *"   # 30분마다 실행 (내부에서 5분 간격 6회 반복)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    concurrency:
      group: presale-monitor
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests

      - name: Git 설정
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: 사전예약 오픈 체크 (5분 간격 6회)
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          for i in $(seq 1 6); do
            echo "=== 체크 ${i}/6 ==="
            python -u presale_monitor.py --once
            git add presale_data.json
            if ! git diff --staged --quiet; then
              git pull --rebase --autostash origin main
              git commit -m "data: presale update [skip ci]"
              git push
            fi
            [ $i -lt 6 ] && sleep 300
          done
