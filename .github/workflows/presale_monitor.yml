name: 사전예약 오픈 감지

on:
  schedule:
    - cron: "0 0 * * *"   # 체인 끊겼을 때 복구용 백업 (매일 자정)
  workflow_dispatch:

permissions:
  contents: write
  actions: write    # 다음 실행 self-trigger용

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    concurrency:
      group: presale-monitor
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests

      - name: Git 설정
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: 사전예약 오픈 체크 (5분 간격, 5.5시간 루프)
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          END_TIME=$(($(date +%s) + 19800))
          while [ $(date +%s) -lt $END_TIME ]; do
            python -u presale_monitor.py --once
            git add presale_data.json
            if ! git diff --staged --quiet; then
              git pull --rebase --autostash origin main
              git commit -m "data: presale update [skip ci]"
              git push
            fi
            REMAINING=$((END_TIME - $(date +%s)))
            [ $REMAINING -gt 300 ] && sleep 300
          done

      - name: 다음 실행 즉시 트리거
        if: ${{ !cancelled() }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run presale_monitor.yml --repo ${{ github.repository }}
